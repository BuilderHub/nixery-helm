# For HA, use storage.backend s3 or gcs and replicaCount > 1.
replicaCount: 1

image:
  repository: ghcr.io/builderhub/nixery-helm/nixery
  tag: 61c016e8423640cc15372e46347b38f0ed3a0eb6
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true

podAnnotations: {}

podSecurityContext: {}

# Optional pod runtime (e.g. kata for stronger workload isolation). Requires a cluster RuntimeClass.
runtimeClassName: ""

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: nixery.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""

nixery:
  channel: "nixpkgs-unstable"
  pkgsRepo: ""
  pkgsPath: ""
  timeout: "3600"
  popularityUrl: ""
  # Optional container securityContext. Null: not rendered; Kubernetes defaults apply (non-privileged).
  securityContext: null
  # Appended to nix.conf via NIX_CONFIG. Stricter sandboxing; relax if builds fail on your cluster.
  nixConfig: |
    sandbox = true
    filter-syscalls = true
  extraEnv: []

storage:
  backend: filesystem
  s3:
    bucket: ""
    endpoint: ""
    region: ""
    # Path-style S3 URLs (MinIO-style). false = virtual-hosted (typical AWS). Requires image built with nixery/patches.
    usePathStyle: true
    existingSecret: ""
    accessKeyKey: "access-key-id"
    secretKeyKey: "secret-access-key"
    createSecret: false
    accessKey: ""
    secretKey: ""
  gcs:
    bucket: ""
    existingSecret: ""
    credentialsKey: "credentials.json"
    mountPath: /var/secrets/google
  filesystem:
    storagePath: /var/lib/nixery-storage
    emptyDir:
      enabled: true
      sizeLimit: ""
    persistence:
      enabled: false
      existingClaim: ""
      storageClass: ""
      size: 20Gi

tmp:
  emptyDir:
    enabled: true
    medium: ""
    sizeLimit: ""

extraVolumes: []
extraVolumeMounts: []

extraEnvFrom: []
