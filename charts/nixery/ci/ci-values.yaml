# Values for CI (Kind), `helm lint -f`, and `helm template` smoke tests.
# Keep repository:tag in sync with NIXERY_IMAGE in .github/workflows/on-pr.yaml (Kind loads that image locally).
# The image must be built from this repo (nixery overlay with metrics patch) so /metrics e2e checks pass.
replicaCount: 1

fullnameOverride: nixery-ci

image:
  repository: ghcr.io/builderhub/nixery-helm/nixery
  tag: f4da656d6ea393ac77c6f86d37f62a258f997c75
  # Use local image after `kind load` in CI; avoids re-pulling private GHCR inside the cluster.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

metrics:
  enabled: true
  path: /metrics

nixery:
  channel: "nixpkgs-unstable"
  pkgsRepo: ""
  pkgsPath: ""
  timeout: "3600"

storage:
  backend: filesystem
  filesystem:
    storagePath: /var/lib/nixery-storage
    emptyDir:
      enabled: true
      sizeLimit: 8Gi
    persistence:
      enabled: false

tmp:
  emptyDir:
    enabled: true
    sizeLimit: 8Gi

podDisruptionBudget:
  enabled: false

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 4Gi
